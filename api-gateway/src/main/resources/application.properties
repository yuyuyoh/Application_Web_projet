spring.application.name=api-gateway
server.port=8080

# Swagger central — pointe sur les proxys locaux (pas de CORS)
springdoc.swagger-ui.urls[0].name=Dictionnaire Service
springdoc.swagger-ui.urls[0].url=/proxy/dictionnaire/api-docs

springdoc.swagger-ui.urls[1].name=Joueur Service
springdoc.swagger-ui.urls[1].url=/proxy/joueur/api-docs

springdoc.swagger-ui.urls[2].name=Partie Service
springdoc.swagger-ui.urls[2].url=/proxy/partie/api-docs

springdoc.swagger-ui.urls[3].name=Score Service
springdoc.swagger-ui.urls[3].url=/proxy/score/api-docs

springdoc.swagger-ui.urls[4].name=Auth Service
springdoc.swagger-ui.urls[4].url=/proxy/auth/api-docs

springdoc.swagger-ui.disable-swagger-default-url=true

# Actuator
management.endpoints.web.exposure.include=health,info

auth.service.url=${AUTH_SERVICE_URL:http://localhost:8085}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
