spring.application.name=joueur-service
server.port=8081

# Base de données H2 fichier (persist entre redémarrages)
spring.datasource.url=jdbc:h2:file:/data/joueurdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Toujours exécuter data.sql (pour créer l'admin si absent)
spring.sql.init.mode=always
# Attendre que JPA crée les tables avant d'exécuter data.sql
spring.jpa.defer-datasource-initialization=true

# Console H2 accessible sur http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator
management.endpoints.web.exposure.include=health,info

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
