apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: score-data-pvc
  namespace: motus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: score-service
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: score-service
  template:
    metadata:
      labels:
        app: score-service
    spec:
      containers:
        - name: score-service
          image: motus/score-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          env:
            - name: EUREKA_URL
              value: "http://discovery-service:8761/eureka"
          volumeMounts:
            - name: score-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: score-data
          persistentVolumeClaim:
            claimName: score-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: score-service
  namespace: motus
spec:
  selector:
    app: score-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
