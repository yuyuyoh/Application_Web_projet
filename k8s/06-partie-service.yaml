apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: partie-data-pvc
  namespace: motus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: partie-service
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: partie-service
  template:
    metadata:
      labels:
        app: partie-service
    spec:
      containers:
        - name: partie-service
          image: motus/partie-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          env:
            - name: EUREKA_URL
              value: "http://discovery-service:8761/eureka"
            - name: DICTIONNAIRE_SERVICE_URL
              value: "http://dictionnaire-service:8082"
            - name: SCORE_SERVICE_URL
              value: "http://score-service:8084"
          volumeMounts:
            - name: partie-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: partie-data
          persistentVolumeClaim:
            claimName: partie-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: partie-service
  namespace: motus
spec:
  selector:
    app: partie-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
