apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: motus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: motus/api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: EUREKA_URL
              value: "http://discovery-service:8761/eureka"
            - name: DICTIONNAIRE_SERVICE_URL
              value: "http://dictionnaire-service:8082"
            - name: JOUEUR_SERVICE_URL
              value: "http://joueur-service:8081"
            - name: PARTIE_SERVICE_URL
              value: "http://partie-service:8083"
            - name: SCORE_SERVICE_URL
              value: "http://score-service:8084"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8085"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: motus
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
