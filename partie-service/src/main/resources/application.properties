spring.application.name=partie-service
server.port=8083

# Base de données H2 fichier (persist entre redémarrages)
spring.datasource.url=jdbc:h2:file:/data/partiedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Console H2 accessible sur http://localhost:8083/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# URLs des autres microservices (variables d'env pour Docker, localhost par défaut)
dictionnaire.service.url=${DICTIONNAIRE_SERVICE_URL:http://localhost:8082}
score.service.url=${SCORE_SERVICE_URL:http://localhost:8084}

# Actuator
management.endpoints.web.exposure.include=health,info

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
